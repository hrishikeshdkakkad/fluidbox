{{- if .Values.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fluidbox.webName" . }}
  labels: {{- include "fluidbox.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "fluidbox.name" . }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "fluidbox.labels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      {{- with .Values.images.pullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: web
          image: {{ include "fluidbox.imageRef" (dict "image" .Values.images.web "ctx" $) | quote }}
          imagePullPolicy: {{ .Values.images.web.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          ports:
            - { name: http, containerPort: 3000 }
          {{- if not (has .Values.web.mode (list "admin" "sso")) }}
          {{- fail (printf "web.mode must be \"admin\" or \"sso\", got %q" .Values.web.mode) }}
          {{- end }}
          env:
            # The dashboard proxy talks to the server's public Service.
            - { name: FLUIDBOX_API_URL, value: "http://{{ include "fluidbox.serverName" . }}:8787" }
            - { name: FLUIDBOX_WEB_MODE, value: {{ .Values.web.mode | quote }} }
            {{- if eq .Values.web.mode "admin" }}
            # The admin token is mounted ONLY in admin mode: an sso-mode proxy
            # forwards the session cookie + CSRF header and carries no operator
            # credential at all (it cannot leak what it does not hold).
            - name: FLUIDBOX_ADMIN_TOKEN
              valueFrom: { secretKeyRef: { name: {{ .Values.existingSecret | quote }}, key: {{ .Values.secretKeys.adminToken | quote }} } }
            {{- end }}
            {{- with .Values.web.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources: {{- toYaml .Values.web.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fluidbox.webName" . }}
  labels: {{- include "fluidbox.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "fluidbox.name" . }}
    app.kubernetes.io/component: web
  ports:
    - { name: http, port: 3000, targetPort: http }
{{- end }}
