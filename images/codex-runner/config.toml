# fluidbox codex baseline config — copied root-owned READ-ONLY into $CODEX_HOME
# at BUILD time (see the `install`/`chmod 0444` block in codex-runner/Dockerfile;
# containers are always fresh from the image, so "baked at build" == "fresh each
# boot"). There is no boot-time materialization step: the image's ENTRYPOINT is
# runner-lib/entrypoint.sh, whose ONLY job is the off-environment credential
# hand-off, and it touches nothing under $CODEX_HOME. The supervisor ALSO
# re-asserts every security-critical setting per-thread (thread/start) and as
# `-c` CLI overrides, so a tampered file cannot loosen governance (defense in
# depth).
#
# The governance model: the fluidbox permission gate is the authority, reached
# because EVERY exec/edit escalates to an approval the supervisor answers. That
# requires (a) approval_policy that asks, (b) a read-only sandbox, and (c) an
# execpolicy rule that removes codex's built-in "known-safe read" auto-run.

# Ask before running anything except known-safe reads; the execpolicy rule
# below removes even that exception so EVERY exec crosses the gate.
approval_policy = "untrusted"
# Approvals route to the supervisor (us), never an LLM auto-reviewer.
approvals_reviewer = "user"
# Codex's OWN sandbox is disabled: read-only/workspace-write use bubblewrap,
# which needs user-namespace/setuid privileges the fluidbox container forbids
# (`cap_drop=ALL` + `no-new-privileges`) — so it fails fatally at startup. The
# fluidbox CONTAINER is the real containment boundary (no caps, egress-blocked,
# disposable /workspace), exactly as for the claude harness, which has no OS
# sandbox either. Governance is UNCHANGED: every exec still crosses the gate
# via approval_policy=untrusted + the universal execpolicy prompt rule (sandbox
# mode only affects post-approval isolation, not whether approval is asked),
# and fork-PR ReadOnly is enforced SERVER-SIDE at the fluidbox gate.
sandbox_mode = "danger-full-access"

# No project doc / AGENTS.md discovery — the system prompt is injected via the
# app-server's developerInstructions, never a repo-discoverable file.
project_doc_max_bytes = 0

# Writable runtime state (sqlite + logs) lives OUTSIDE the read-only CODEX_HOME
# so config.toml + rules stay immutable while codex can still run a thread.
sqlite_home = "/opt/fluidbox-codex/state"
log_dir = "/opt/fluidbox-codex/state/log"

# OpenTelemetry: OFF. Codex's OTel is opt-IN — it is disabled unless an [otel]
# section turns it on, so we deliberately DO NOT declare one. (A prior
# `[otel] environment=…` here did the opposite of its intent: it ENABLED the
# exporter, which then failed fatally with EACCES inside the hardened, egress-
# controlled container — the codex app-server never started. No section = no
# telemetry = no phone-home, and codex boots.)

# Tool-surface lockdown (also re-asserted in thread/start.config). The facade
# additionally STRIPS any server-executed tool that survives, so this is
# defense in depth: disable a SUPERSET (unknown feature keys are ignored
# without --strict-config).
[tools]
web_search = false
view_image = false

[features]
web_search = false
standalone_web_search = false
view_image = false
unified_exec = false
multi_agent = false
apps = false
hooks = false
memories = false
goals = false
plugins = false
skills = false
shell_snapshot = false
shell_snapshots = false
browser_use = false
computer_use = false
image_generation = false
in_app_browser = false
tool_suggest = false
tool_search = false
fast_mode = false
personality = false

# No MCP servers configured here: the frozen capability set is wired per-run
# by the supervisor (broker-shim / sandbox-gate-shim), never from a static
# config the agent could point elsewhere.
