name: ci

on:
  push:
    branches: [main]
  pull_request:
  # The e2e job (below) is manual-only — it builds both runner images and
  # drives a full stack for up to 45 min, which burns real Actions minutes on
  # every push. Trigger it by hand from the Actions tab (or `gh workflow run
  # ci.yml --ref <branch>`) when you actually want the acceptance run.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-latest
    # A real Postgres so the fluidbox-db tests actually run — without
    # DATABASE_URL they self-skip and the persistence layer goes untested.
    # Vanilla PG is fine here: Neon is only special in production, and
    # LISTEN/NOTIFY + the migration path are stock Postgres.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fluidbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/fluidbox
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: debug
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  # Supply-chain gate: advisories, licenses, bans, sources (deny.toml).
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # The full acceptance suite, no-model tier: builds BOTH runner images
  # (base-image bumps can't be vacuously green — closes the #14 gap) and
  # drives the real stack over HTTP. Live tiers are skipped — CI never
  # spends model credits; run `just e2e` locally with keys for those.
  #
  # MANUAL-ONLY: this job costs real Actions minutes (two image builds + a
  # 45-min stack), so it does NOT run on pull_request or push — only when
  # dispatched by hand. The cheap gates (rust/web/deny) still run on every PR.
  e2e:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fluidbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: debug
      - name: craft .env
        run: |
          cat > .env <<EOF
          DATABASE_URL=postgres://postgres:postgres@127.0.0.1:5432/fluidbox
          FLUIDBOX_BIND=0.0.0.0:8787
          FLUIDBOX_ADMIN_TOKEN=$(openssl rand -hex 32)
          FLUIDBOX_CREDENTIAL_KEY=$(openssl rand -hex 32)
          FLUIDBOX_PUBLIC_CONTROL_URL=http://host.docker.internal:8787
          FLUIDBOX_DATA_DIR=./data
          FLUIDBOX_SANDBOX_IMAGE=fluidbox-sandbox-runner:ci
          FLUIDBOX_CODEX_SANDBOX_IMAGE=fluidbox-codex-runner:ci
          LITELLM_MASTER_KEY=sk-litellm-ci-only
          LLM_UPSTREAM_URL=http://127.0.0.1:4000
          EOF
      - name: acceptance suite (no live tiers)
        env:
          E2E_SKIP_LIVE: "1"
        run: bash scripts/e2e.sh

  # Coverage on main pushes only (it re-runs the whole test suite).
  # The lcov report is an artifact; the summary lands in the job log.
  coverage:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fluidbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-timeout 5s
          --health-interval 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/fluidbox
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage
      - name: coverage
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info
          cargo llvm-cov report --summary-only
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: lcov.info
