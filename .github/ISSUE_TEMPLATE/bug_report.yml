name: 🐛 Bug report
description: Something doesn't work the way it should
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        **Security issues:** please do NOT file them here — use [private vulnerability reporting](https://github.com/hrishikeshdkakkad/fluidbox/security/advisories/new) instead (see SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: |
        1. Started a run with …
        2. Approved the Bash tool call …
        3. Expected the run to complete; instead it …
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        Server logs (`RUST_LOG=debug` helps), runner output, or dashboard errors.
        This is rendered as code automatically — no backticks needed. Please redact tokens and connection strings.
      render: text
  - type: dropdown
    id: surface
    attributes:
      label: Where does it happen?
      multiple: true
      options:
        - Control plane / API (fluidbox-server)
        - Policy / approvals / permission gate
        - Sandbox / runner (Claude harness)
        - Sandbox / runner (Codex harness)
        - Triggers / webhooks / schedules
        - GitHub integration
        - Capabilities / MCP / connectors
        - Dashboard (apps/web)
        - CLI
        - Database / migrations
        - Docs / setup
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, how you run fluidbox, and versions.
      placeholder: |
        OS: macOS 15.5 (arm64)
        Running via: just dev
        Docker: 28.x
        Commit: `git rev-parse --short HEAD`
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: I checked the environment gotchas in `.env.example` / CONTRIBUTING.md (direct Neon connection string, `FLUIDBOX_BIND=0.0.0.0:8787`, …).
